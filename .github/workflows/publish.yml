name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OIDC env presence (diagnostic)
        run: |
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS:-unset}"
          echo "ID_TOKEN_REQUEST_URL_present=${ACTIONS_ID_TOKEN_REQUEST_URL:+YES}"

      # Deliberately NO `registry-url`: that input makes setup-node write an
      # .npmrc with a placeholder `_authToken`, which suppresses OIDC trusted
      # publishing. The publish registry comes from publishConfig.registry.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - run: npm install -g npm@latest
      - run: npm -v

      - run: npm ci
      - run: npm run typecheck
      - run: npm run check
      - run: npm test
      - run: npm run build

      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a
      # short-lived publish credential and attaches provenance automatically.
      - name: Publish to npm
        run: npm publish --loglevel verbose
